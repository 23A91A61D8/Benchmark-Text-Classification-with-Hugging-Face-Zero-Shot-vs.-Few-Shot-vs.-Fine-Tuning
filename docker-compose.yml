version: "3.9"
services:
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    image: text-classification-benchmark:latest
    container_name: text-classification-benchmark
    env_file:
      - .env.example
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./results:/app/results
      - hf-cache:/app/.cache/huggingface
    shm_size: "2gb"
volumes:
  hf-cache: